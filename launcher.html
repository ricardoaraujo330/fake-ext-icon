<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Atlas</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f2;
        color: #171717;
      }

      main {
        width: min(360px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #4b5563;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>A abrir o Atlas...</h1>
      <p>
        Se o protocolo nao arrancar sozinho, abre
        <a href="atlas://extensions">atlas://extensions</a>.
      </p>
    </main>
    <script src="launcher.js"></script>
  </body>
 </html>
